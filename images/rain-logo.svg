<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64">
  <!-- 三线落雨 -->
  <line x1="122" y1="4"  x2="122" y2="18" stroke="#1a1815" stroke-width=".7" stroke-linecap="round"/>
  <line x1="130" y1="2"  x2="130" y2="20" stroke="#1a1815" stroke-width=".9" stroke-linecap="round"/>
  <line x1="138" y1="6"  x2="138" y2="16" stroke="#1a1815" stroke-width=".5" stroke-linecap="round"/>
  <!-- 金点 -->
  <circle cx="130" cy="1" r=".8" fill="#b8943e"/>
  <!-- RAIN -->
  <text x="130" y="40" text-anchor="middle" font-family="Georgia,serif" font-size="26" letter-spacing="10" fill="#1a1815">RAIN</text>
  <!-- 金线 -->
  <line x1="28" y1="43.5" x2="232" y2="43.5" stroke="#b8943e" stroke-width=".25" stroke-linecap="round"/>
  <!-- PERFUME AS RAIN -->
  <text x="130" y="53" text-anchor="middle" font-family="'Inter','Helvetica Neue',sans-serif" font-weight="300" font-size="6" letter-spacing="6" fill="#1a1815" opacity=".4">PERFUME AS RAIN</text>
  <!-- 香水之雨 -->
  <text x="130" y="62" text-anchor="middle" font-family="'Noto Serif SC',serif" font-weight="200" font-size="7" letter-spacing="4" fill="#1a1815" opacity=".3">香水之雨</text>
</svg>
