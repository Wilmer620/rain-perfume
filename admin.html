<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAIN · 降雨预报 · 订阅管理</title>
<style>
:root{--bg:#fdf9f0;--ink:#2b2722;--ink2:#5c5750;--ink3:#8a857b;--gold:#b8943e;--gold-d:#8b691e;--radius:6px}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Serif SC',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding:2rem;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:.15em;margin-bottom:.3rem}
.sub{font-size:.75rem;color:var(--ink3);margin-bottom:2.5rem}
.card{background:rgba(255,253,248,.5);backdrop-filter:blur(16px);border:1px solid rgba(184,148,62,.06);border-radius:var(--radius);padding:1.5rem 2rem;margin-bottom:1.5rem;width:100%;max-width:900px}
.stats{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:2.5rem;justify-content:center}
.stat{background:rgba(255,253,248,.4);backdrop-filter:blur(8px);border:1px solid rgba(184,148,62,.05);border-radius:var(--radius);padding:1.2rem 2rem;text-align:center;min-width:120px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--gold);font-weight:500}
.stat-label{font-size:.6rem;letter-spacing:.3em;color:var(--ink3);text-transform:uppercase;margin-top:.3rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.6rem;letter-spacing:.25em;color:var(--gold-d);text-transform:uppercase;padding:.8rem 1rem;border-bottom:1px solid rgba(184,148,62,.08)}
td{font-size:.75rem;color:var(--ink2);padding:.7rem 1rem;border-bottom:1px solid rgba(184,148,62,.03)}
.badge{display:inline-block;font-size:.55rem;letter-spacing:.2em;padding:.2rem .7rem;border-radius:100px;text-transform:uppercase}
.badge-email{background:rgba(184,148,62,.1);color:var(--gold-d)}
.badge-phone{background:rgba(107,118,128,.1);color:var(--ink3)}
.loading{color:var(--ink3);font-style:italic;font-size:.85rem}
.error{color:#b84444;font-size:.85rem}
.btn{font-family:'Inter',sans-serif;font-size:.62rem;letter-spacing:.25em;color:var(--bg);background:var(--gold-d);border:none;border-radius:100px;padding:.5rem 1.5rem;cursor:pointer;text-transform:uppercase;transition:background .3s}
.btn:hover{background:var(--gold)}
.btn-outline{background:transparent;color:var(--gold-d);border:1px solid rgba(184,148,62,.15)}
.btn-outline:hover{background:rgba(184,148,62,.06);color:var(--gold)}
.toolbar{display:flex;gap:1rem;align-items:center;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
/* Login */
.login-box{text-align:center;padding:4rem 2rem;max-width:400px;width:100%}
.login-box h2{font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:.12em;margin-bottom:2rem;font-size:1.4rem}
.login-box input{width:100%;max-width:280px;font-family:'Inter',sans-serif;font-size:.8rem;letter-spacing:.15em;color:var(--ink);background:rgba(255,253,248,.6);backdrop-filter:blur(8px);border:1px solid rgba(184,148,62,.12);border-radius:100px;padding:.7rem 1.4rem;outline:none;text-align:center;transition:border-color .4s}
.login-box input::placeholder{color:var(--ink3);opacity:.4}
.login-box input:focus{border-color:var(--gold)}
.login-box .btn{margin-top:1.2rem;padding:.55rem 2rem}
.login-error{color:#b84444;font-size:.7rem;margin-top:1rem;display:none}
.dashboard{display:none}
.dashboard.show{display:block;width:100%;max-width:900px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
@media(max-width:640px){body{padding:1rem}.card{padding:1rem}.stats{gap:1rem}.stat{padding:.8rem 1.2rem}}
</style>
</head>
<body>

<div class="login-box card" id="loginBox">
  <h2>降雨预报 · 管理中心</h2>
  <input type="password" id="passwordInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()">
  <br><button class="btn" onclick="login()">进入</button>
  <p class="login-error" id="loginError">密码错误</p>
</div>

<div class="dashboard" id="dashboard">
  <div class="top-bar">
    <div>
      <h1>RAIN · 降雨预报</h1>
      <p class="sub">订阅者管理 · Subscriber Dashboard</p>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <span style="font-size:.65rem;color:var(--ink3)" id="lastUpdated"></span>
      <button class="btn btn-outline" onclick="location.reload()" style="font-size:.55rem;padding:.4rem 1rem">退出</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn" onclick="loadData()">刷新数据</button>
    <button class="btn btn-outline" onclick="exportCSV()">导出 CSV</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">总订阅</div></div>
    <div class="stat"><div class="stat-num" id="statEmail">—</div><div class="stat-label">邮箱</div></div>
    <div class="stat"><div class="stat-num" id="statPhone">—</div><div class="stat-label">手机号</div></div>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>联系方式</th><th>类型</th><th>订阅时间</th></tr></thead>
      <tbody id="tableBody"><tr><td colspan="3" class="loading">加载中...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API_KEY = '090620ghg';
const API = '/api/admin?key=' + API_KEY;

function login() {
  var pw = document.getElementById('passwordInput').value;
  if (pw === API_KEY) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function formatDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('zh-CN', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
}

async function loadData() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="3" class="loading">加载中...</td></tr>';
  try {
    var res = await fetch(API);
    if (!res.ok) throw new Error('无法连接服务器，请确保 node server.js 正在运行');
    var data = await res.json();
    render(data);
    document.getElementById('lastUpdated').textContent = '更新: ' + formatDate(new Date().toISOString());
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="3" class="error">' + e.message + '</td></tr>';
  }
}

function render(data) {
  var tbody = document.getElementById('tableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--ink3)">暂无订阅记录。当有用户通过网站提交后，这里会显示。</td></tr>';
    updateStats(0,0,0);
    return;
  }
  var sorted = data.slice().reverse();
  tbody.innerHTML = sorted.map(function(s) {
    var typeLabel = s.type === 'email' ? '邮箱' : '手机号';
    var badgeCls = s.type === 'email' ? 'badge-email' : 'badge-phone';
    return '<tr><td>' + esc(s.contact) + '</td><td><span class="badge ' + badgeCls + '">' + typeLabel + '</span></td><td>' + formatDate(s.subscribedAt) + '</td></tr>';
  }).join('');
  var emails = data.filter(function(s){return s.type==='email'}).length;
  var phones = data.filter(function(s){return s.type==='phone'}).length;
  updateStats(data.length, emails, phones);
}

function updateStats(total, email, phone) {
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statEmail').textContent = email;
  document.getElementById('statPhone').textContent = phone;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportCSV() {
  fetch(API).then(function(r){return r.json()}).then(function(data){
    var csv = 'contact,type,subscribedAt\n' + data.map(function(s){return s.contact + ',' + s.type + ',' + s.subscribedAt}).join('\n');
    var blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = 'rain-subscribers.csv'; a.click();
    URL.revokeObjectURL(url);
  });
}
</script>
</body>
</html>
